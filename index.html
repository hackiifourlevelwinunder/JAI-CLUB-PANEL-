<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAI CLUB VIP CHANEL PANEL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
position:relative;
}

/* BACKGROUND EFFECT */

.bg{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.bg span{
position:absolute;
display:block;
border-radius:50%;
background:rgba(0,255,255,0.08);
animation:float 15s linear infinite;
bottom:-150px;
}

.bg span:nth-child(1){
left:10%;
width:220px;
height:220px;
animation-duration:18s;
}

.bg span:nth-child(2){
left:70%;
width:170px;
height:170px;
animation-duration:14s;
}

.bg span:nth-child(3){
left:40%;
width:120px;
height:120px;
animation-duration:11s;
}

.bg span:nth-child(4){
left:85%;
width:260px;
height:260px;
animation-duration:20s;
}

.bg span:nth-child(5){
left:25%;
width:180px;
height:180px;
animation-duration:16s;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-1200px) rotate(720deg);
opacity:0;
}
}

/* MAIN PANEL */

.container{
position:relative;
z-index:10;
width:92%;
max-width:560px;
padding:35px;
border-radius:35px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:
0 0 25px rgba(0,255,255,0.25),
0 0 80px rgba(0,255,255,0.10);
text-align:center;
animation:show 1s ease;
}

@keyframes show{
from{
opacity:0;
transform:scale(0.8);
}
to{
opacity:1;
transform:scale(1);
}
}

/* HEADER */

.logo{
font-size:40px;
font-weight:900;
color:#00fff7;
text-shadow:
0 0 10px #00fff7,
0 0 20px #00fff7,
0 0 40px #00fff7;
margin-bottom:8px;
}

.tag{
font-size:22px;
font-weight:700;
color:white;
margin-bottom:30px;
}

/* UID BOX */

.uidBox{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.08);
margin-bottom:25px;
box-shadow:0 0 20px rgba(0,255,255,0.08);
}

.uidTitle{
font-size:18px;
font-weight:700;
color:#00fff7;
margin-bottom:12px;
}

input{
width:100%;
padding:20px;
border:none;
outline:none;
border-radius:18px;
background:#111827;
color:white;
font-size:22px;
font-weight:800;
text-align:center;
letter-spacing:1px;
box-shadow:0 0 15px rgba(0,255,255,0.10);
}

/* LOADING */

.loading{
width:100%;
height:22px;
background:#111827;
border-radius:50px;
overflow:hidden;
display:none;
margin-bottom:25px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00fff7,#00ff88);
transition:0.2s;
}

/* BUTTONS */

.btns{
display:flex;
flex-direction:column;
gap:18px;
}

button{
padding:20px;
border:none;
border-radius:22px;
font-size:20px;
font-weight:900;
cursor:pointer;
transition:0.3s;
color:white;
letter-spacing:1px;
}

button:hover{
transform:scale(1.04);
}

.yes{
background:linear-gradient(45deg,#00ff88,#00c96b);
box-shadow:0 0 25px rgba(0,255,120,0.45);
}

.no{
background:linear-gradient(45deg,#ff004c,#ff5e7a);
box-shadow:0 0 25px rgba(255,0,90,0.45);
}

.mix{
background:linear-gradient(45deg,#008cff,#5f00ff);
box-shadow:0 0 25px rgba(0,153,255,0.45);
}

/* RESULT */

.result{
margin-top:30px;
padding:30px;
border-radius:28px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
font-size:25px;
font-weight:900;
color:white;
line-height:1.7;
min-height:180px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
box-shadow:0 0 25px rgba(0,255,255,0.08);
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{
box-shadow:0 0 15px rgba(0,255,255,0.08);
}
to{
box-shadow:0 0 35px rgba(0,255,255,0.20);
}
}

.uid{
display:block;
font-size:30px;
margin-bottom:14px;
color:#00fff7;
text-shadow:
0 0 10px #00fff7,
0 0 20px #00fff7;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:25px;
}

.card{
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
font-size:15px;
font-weight:700;
color:white;
box-shadow:0 0 15px rgba(255,255,255,0.04);
}

/* FOOTER */

.footer{
margin-top:28px;
font-size:18px;
font-weight:700;
color:#00fff7;
text-shadow:0 0 12px #00fff7;
}

</style>
</head>
<body>

<!-- BACKGROUND -->

<div class="bg">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<!-- MAIN PANEL -->

<div class="container">

<div class="logo">
JAI CLUB VIP CHANEL PANEL
</div>

<div class="tag">
EARN WITH HACKII
</div>

<!-- UID INPUT -->

<div class="uidBox">

<div class="uidTitle">
ENTER UID NUMBER
</div>

<input type="text" id="uid" placeholder="TYPE UID HERE">

</div>

<!-- LOADING -->

<div class="loading" id="loading">
<div class="bar" id="bar"></div>
</div>

<!-- BUTTONS -->

<div class="btns">

<button class="yes" onclick="checkUID('yes')">
YES PANEL ACTIVE
</button>

<button class="no" onclick="checkUID('no')">
NO PANEL FOUND
</button>

<button class="mix" onclick="checkUID('mix')">
YES + NO STATUS
</button>

</div>

<!-- RESULT -->

<div class="result" id="result">
VIP DATABASE READY FOR UID CHECK
</div>

<!-- EXTRA CARDS -->

<div class="cards">

<div class="card">
VIP SERVER ONLINE
</div>

<div class="card">
PREMIUM ACCESS
</div>

<div class="card">
FAST UID CHECKER
</div>

<div class="card">
SECURE PANEL SYSTEM
</div>

</div>

<!-- FOOTER -->

<div class="footer">
HIGH LEVEL PROFESSIONAL UI
</div>

</div>

<script>

function checkUID(type){

let uid = document.getElementById('uid').value;

if(uid == ''){
alert('ENTER UID FIRST');
return;
}

let loading = document.getElementById('loading');
let bar = document.getElementById('bar');
let result = document.getElementById('result');

loading.style.display = 'block';

bar.style.width = '0%';

result.innerHTML = 'CONNECTING TO VIP SERVER...';

let width = 0;

let process = setInterval(function(){

width += 10;

bar.style.width = width + '%';

if(width >= 100){

clearInterval(process);

setTimeout(function(){

if(type == 'yes'){

result.innerHTML = `
<div>
<span class="uid">UID : ${uid}</span>
VIP CHANEL DONE <br>
ID PANEL ACTIVE ON ID ✅
</div>
`;

}

if(type == 'no'){

result.innerHTML = `
<div>
<span class="uid">UID : ${uid}</span>
UID DONE BUT DEPOSIT <br>
NOT FOUND PANEL ❌
</div>
`;

}

if(type == 'mix'){

result.innerHTML = `
<div>
<span class="uid">UID : ${uid}</span>
THIS UID NOT PANEL UNDER LINK <br>
REGISTER NOW NEW NUMBER ⚠️
</div>
`;

}

},500);

}

},180);

}

</script>

</body>
</html>
